name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 runner for all JavaScript-based actions before the
# 2026-06-02 forced switch. setup-node@v4 is still on the Node 20 runner
# by default — flipping this env makes us forward-compatible today.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Security audit (npm)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  rust:
    # Skip on Dependabot PRs. Dependabot-created PRs run in a forked
    # security context that cannot access repository secrets, so
    # `secrets.ECHOBIRD_SECRET_DEPLOY_KEY` arrives empty and the
    # webfactory/ssh-agent step fails before any rust code runs.
    # Dependabot only opens PRs for GitHub Actions / dependency version
    # bumps (config-only, no rust diff), so the frontend job still runs
    # and the rust job re-runs on the merge commit to main.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      # Force Cargo to use the system `git` CLI when fetching git
      # dependencies. libgit2 cannot use the SSH agent that
      # webfactory/ssh-agent sets up, so the closed-source
      # echobird_core fetch would fail without this.
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v6

      # Load the EchoBird-secret read-only deploy key into the SSH
      # agent so Cargo can clone the private crate during fetch.
      - name: Setup SSH for private deps (echobird_core)
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.ECHOBIRD_SECRET_DEPLOY_KEY }}

      # Cargo.toml references EchoBird-secret over HTTPS so local
      # development can use the GitHub credential helper. In CI we
      # have an SSH key but no HTTPS credentials, so rewrite the URL
      # to SSH for git fetches.
      - name: Rewrite EchoBird-secret URL to SSH
        run: git config --global url."git@github.com:edison7009/EchoBird-secret-.git".insteadOf "https://github.com/edison7009/EchoBird-secret-.git"

      # Pinned to 1.93 to stop new clippy lints in every Rust release
      # (introduced as `-D warnings` failures) from spuriously breaking
      # CI when the dev environment is on an older stable. Bump
      # deliberately when we want to adopt new lints; mirror the change
      # in release.yml so the build matrix stays in lockstep.
      - uses: dtolnay/rust-toolchain@1.100
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Format check
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Security audit (cargo)
        run: |
          cargo install cargo-audit --locked --quiet || true
          cargo audit --file src-tauri/Cargo.lock
        continue-on-error: true
